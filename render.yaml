services:
  - type: web
    name: cargo-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && cd apps/api && npx prisma generate && npx prisma migrate deploy && pnpm run build
    startCommand: node apps/api/dist/src/main.js
    healthCheckPath: /api/warehouses
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Set manually in Render dashboard (Neon pooled URL)
      - key: DIRECT_URL
        sync: false # Set manually (Neon direct URL)
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false # Set manually if using external Redis
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        value: "9000"
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: cargo-photos
      - key: TELEGRAM_BOT_TOKEN
        sync: false
